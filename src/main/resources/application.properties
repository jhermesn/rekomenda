spring.application.name=rekomenda-api
server.address=0.0.0.0

# --- DataSource (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rekomenda}
spring.datasource.username=${DB_USERNAME:rekomenda}
spring.datasource.password=${DB_PASSWORD:rekomenda}
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA ---
spring.jpa.open-in-view=false
# For local Docker usage, let Hibernate create/update tables automatically.
# Flyway scripts remain as the source of truth for production environments.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Redis ---
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# --- Mail (SMTP) ---
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- JWT ---
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# --- TMDB ---
app.tmdb.api-key=${TMDB_API_KEY}
app.tmdb.base-url=https://api.themoviedb.org/3
app.tmdb.movie-cache-ttl-days=${TMDB_MOVIE_CACHE_TTL_DAYS:7}

# --- App ---
app.frontend-url=${FRONTEND_URL:http://localhost:3000}
app.cors-allowed-origin=${CORS_ALLOWED_ORIGIN:http://localhost:3000}
app.room.ttl-minutes=30
app.room.recommendation-timeout-seconds=${ROOM_RECOMMENDATION_TIMEOUT_SECONDS:60}
app.room.max-participants=10
app.room.max-movies-per-generation=50
app.recommendation.dashboard-cache-ttl-minutes=${RECOMMENDATION_DASHBOARD_CACHE_TTL_MINUTES:5}

# --- Spring AI (Vertex AI Gemini) ---
spring.ai.vertex.ai.gemini.project-id=${VERTEX_PROJECT_ID}
spring.ai.vertex.ai.gemini.location=${VERTEX_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=${VERTEX_MODEL:gemini-2.5-pro}

# --- Actuator (health check) ---
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# --- OpenAPI / Swagger ---
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
