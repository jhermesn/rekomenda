services:

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    networks:
      - rekomenda_internal
    environment:
      POSTGRES_DB: rekomenda
      POSTGRES_USER: rekomenda
      POSTGRES_PASSWORD: rekomenda
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rekomenda -d rekomenda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - rekomenda_internal
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: rekomenda-api
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - rekomenda_internal
      - homelab
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/rekomenda
      DB_USERNAME: rekomenda
      DB_PASSWORD: rekomenda
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ""
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp-credentials.json
    volumes:
      - ./gcp-credentials.json:/app/gcp-credentials.json:ro
    labels:
      logging: "promtail"
      service: "rekomenda-api"

networks:
  rekomenda_internal:
    driver: bridge
  homelab:
    external: true

volumes:
  postgres_data:
