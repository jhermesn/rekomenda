name: Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build JAR
        run: ./mvnw package -DskipTests -q

      - name: Compute version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date -u +%Y%m%d)
          # Count how many releases already exist with today's date prefix to get the next ID
          EXISTING=$(gh release list --limit 1000 --json tagName \
            --jq "[.[] | select(.tagName | startswith(\"${DATE}-\"))] | length" 2>/dev/null || echo "0")
          ID=$((EXISTING + 1))
          VERSION="${DATE}-${ID}"
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "JAR_PATH=$(ls target/*.jar | grep -v 'original')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.VERSION }}" \
            --title "Release ${{ steps.version.outputs.VERSION }}" \
            --notes "Automated release built from commit \`${{ github.sha }}\` on branch \`${{ github.ref_name }}\`." \
            "${{ steps.version.outputs.JAR_PATH }}"
